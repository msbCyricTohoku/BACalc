name: Pylint

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # If you really have requirements.txt, keep this.
          # Otherwise comment it out to avoid failures.
          pip install -r requirements.txt
          pip install pylint

      - name: Analyse the code with pylint
        run: |
          # Lint only the core modules
          pylint --exit-zero app.py ba_core.py ba_gui.py ba_plot.py
          # Remove --exit-zero later when you want CI to fail on lint errors
